<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教師配課查詢系統</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .result { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; text-align: left; line-height: 1.5; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; text-align: center; }

        /* 💡 新加入的右下角標誌樣式 */
        .corner-logo {
            position: fixed;   /* 固定在螢幕上，不隨捲軸滾動 */
            bottom: 20px;     /* 距離底部 20px */
            right: 20px;      /* 距離右邊 20px */
            max-width: 100px; /* 限制標誌的最大寬度，可依你的圖片大小調整 */
            height: auto;     /* 保持圖片比例 */
            opacity: 0.8;      /* 讓圖片帶一點透明度 (選用)，看起來比較低調 */
            z-index: 1000;    /* 確保圖片浮在最上層 */
            transition: opacity 0.3s; /* 滑鼠移過去時有漸變效果 */
        }
        /* 滑鼠移上去時變完全不透明 */
        .corner-logo:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>配課查詢系統</h2>
    <input type="text" id="teacherId" placeholder="請輸入您的工號">
    <button onclick="querySchedule()">查詢配課</button>

    <div id="resultBox" class="result"></div>
</div>

<script>
    // 使用瀏覽器內建功能進行 SHA-256 加密，不再依賴外部套件
    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        return hashHex;
    }

    async function querySchedule() {
        const idInput = document.getElementById('teacherId').value.trim();
        const resultBox = document.getElementById('resultBox');
        
        if (!idInput) {
            alert('請先輸入工號！');
            return;
        }

        try {
            // 1. 將輸入的工號轉為 SHA-256 (使用內建功能)
            const hashedId = await sha256(idInput);

            // 2. 嘗試去抓取該雜湊值對應的 JSON 檔案
            const response = await fetch(`./teachers/${hashedId}.json`);
            
            if (!response.ok) {
                throw new Error('找不到該工號的資料');
            }

            const data = await response.json();

            // 3. 顯示查詢結果
            resultBox.className = "result success";
            resultBox.innerHTML = `
                <strong>姓名：</strong> ${data.name} <br><br>
                <strong>任教班級：</strong><br> ${data.classes.replace(/\n/g, '<br>')}
            `;
            resultBox.style.display = 'block';

        } catch (error) {
            // 找不到檔案代表工號輸入錯誤，或沒有配課資料
            resultBox.className = "result error";
            resultBox.innerHTML = "查無此工號，請重新確認。";
            resultBox.style.display = 'block';
        }
    }
</script>

<!-- 💡 新加入的圖片 HTML 標籤 -->
<img src="logo.png" alt="Logo" class="corner-logo">

</body>
</html>
